<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privat Ihsan</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxKrKY8RmEFx7bJWvMyfKxZqicIgonjcfA_kxFvkFQlzL7xs96Iq6sOSjM9GLvvgerE/exec"></iframe>

    <script>
      // Mendaftarkan Service Worker agar bisa di-install
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker terdaftar!', reg))
            .catch(err => console.log('Gagal:', err));
        });
      }
    </script>
</body>
</html>
